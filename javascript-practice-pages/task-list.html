<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Gluten:wght@100..900&family=Henny+Penny&display=swap"
      rel="stylesheet"
    />
    <script
      src="https://kit.fontawesome.com/ef92c49664.js"
      crossorigin="anonymous"
    ></script>
    <script src="projects-logic/task-list/main.js" defer></script>
    <link rel="stylesheet" href="css/task-list.css" />
    <title>Task List</title>
  </head>
  <body>
    <h1 class="henny-penny-font">My Tasks</h1>
    <br />
    <ul id="list-container">
      <li class="list-item" id="first-list-item">
        <input type="checkbox" class="checkbox" /><input
          type="text"
          class="text-box gluten-font"
          maxlength="30"
        />
        <div id="first-x" class="delete-box">X</div>
      </li>
    </ul>
    <button id="add-list-item">
      <i class="fa-solid fa-plus green-plus"></i>
    </button>
    <br />
    <br /><br /><br /><br /><br /><br />
    <a
      href="./index.html"
      target="_blank"
      rel="noopener"
      class="henny-penny-font"
      id="other-projects"
      >Other Projects</a
    >
  </body>
</html>

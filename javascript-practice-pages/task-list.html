<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script
      src="https://kit.fontawesome.com/ef92c49664.js"
      crossorigin="anonymous"
    ></script>
    <script src="projects-logic/task-list/main.js" defer></script>

    <style>
      #list-container {
        text-align: center;
        width: 80%;
      }

      h1 {
        text-align: center;
      }

      .list-item {
        list-style-type: none;
        display: flex;
        align-items: center;
        margin-bottom: 20px;
        border: 2px solid black;
        height: 40px;
        padding-left: 10px;
        padding-right: 40px;
        position: relative;
      }

      .delete-box {
        position: absolute;
        right: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 20px;
        color: red;
        border-left: 2px solid black;
        height: 40px;
        width: 30px;
      }

      .green-plus {
        font-size: 30px;
        color: green;
        height: 15px;
        width: 10px;
        padding: 10px;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      #add-list-item {
        margin-left: calc(50% - 20px);
      }

      .text-box {
        width: 100%;
      }

      .list-item input[type="checkbox"]:checked + .text-box {
        text-decoration: line-through;
        color: gray;
      }
      
    </style>
    <title>Task List</title>
  </head>
  <body>
    <h1>My Tasks</h1>
    <br />
    <ul id="list-container">
      <li class="list-item" id="first-list-item"><input type="checkbox" /><input type="text" class="text-box" maxlength="30"><div id="first-x" class="delete-box">X</div></input></li>
    </ul>
    <button id="add-list-item">
      <i class="fa-solid fa-plus green-plus"></i>
    </button>
    <br />
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/image-gallery.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fascinate+Inline&family=Patrick+Hand&display=swap"
      rel="stylesheet"
    />
    <script src="projects-logic/image-gallery/main.js" defer></script>
    <title>Image Gallery</title>
  </head>
  <body>
    <heading>
      <h1 class="title-font">Image Gallery</h1>
      <label for="image-url" class="other-font">Paste Image URL</label>
      <input
        type="url"
        id="image-url"
        placeholder="https://www.example.com/image.jpg"
        class="other-font"
        required
      />
      <button type="button" id="add-button" class="other-font">
        Add Image
      </button>
    </heading>
    <div id="image-display"></div>
    <footer>
      <a
        href="./index.html"
        target="_blank"
        rel="noopener"
        id="other-projects"
        class="other-font"
        >Other Projects</a
      >
    </footer>
  </body>
</html>

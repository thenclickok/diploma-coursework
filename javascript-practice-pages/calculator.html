<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
  </head>
  <body>
    <h1>Calculator</h1>
    <div id="calculator-container">
      <input
        type="number"
        id="number1"
        name="number1"
        placeholder="Enter the first number"
      />
      <input
        type="number"
        id="number2"
        name="nubmer2"
        placeholder="Enter the second number"
      />
      <button type="button" id="add" name="add">+</button>
      <button type="button" id="subtract" name="subtract">-</button>
      <button type="button" id="multiply" name="multiply">x</button>
      <button type="button" id="divide" name="divide">/</button>
      <div id="result"></div>
    </div>
    <script src="projects-logic/calculator/main.js"></script>
  </body>
</html>

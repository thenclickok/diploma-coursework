<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <link rel="stylesheet" href="css/my-array.css" />
    <script src="projects-logic/my-array/main.js" defer></script>
    <title>My Array</title>

  <body>
    <div id="container">
      <h1>My Array: a shopping list</h1>
      <div id="array-section"></div>
      <br />
      <div id="add-section">
        <input
          type="text"
          id="add-item"
          maxlength="10"
          placeholder="Enter item"
        /><br />
        <button type="button" id="add-top-button">Add to top</button>
        <button type="button" id="add-bottom-button">Add to bottom</button>
      </div>
      <div id="delete-section">
        <button type="button" id="delete-top-button">Delete from top</button>
        <button type="button" id="delete-bottom-button">
          Delete from bottom
        </button>
      </div>
      <figcaption>
        Background photo by
        <a
          href="https://unsplash.com/@dementedpixel?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText"
          target="_blank"
          rel="noopener"
          >Nigel Hoare</a
        >
        on
        <a
          href="https://unsplash.com/photos/colorful-shopping-bags-are-packed-closely-together-5b5f8KrkDaU?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText"
          target="_blank"
          rel="noopener"
          >Unsplash</a
        >
      </figcaption>
    </div>
    <br />

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Array</title>
  </head>
  <body>
    <h1>My Array: a shopping list</h1>
    <div id="array-section"></div>
    <br />
    <div id="add-top-section">
      <label for="add-top-item">Enter item</label>
      <input type="text" id="add-top-item" max="10" />
      <button type="submit" id="add-top-button">Add to top</button>
    </div>
    <br />
    <div id="add-bottom-section">
      <label for="add-bottom-item">Enter item</label>
      <input type="text" id="add-bottom-item" max="10" />
      <button type="submit" id="add-bottom-button">Add to bottom</button>
    </div>
    <br />
    <div id="delete-top-section">
      <button type="submit" id="delete-top-button">Delete from top</button>
    </div>
    <br />
    <div id="delete-bottom-section">
      <button type="submit" id="delete-bottom-button">
        Delete from bottom
      </button>
    </div>
  </body>
</html>

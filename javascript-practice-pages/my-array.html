<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="projects-logic/my-array/main.js" defer></script>
    <title>My Array</title>
  </head>
  <body
    style="
      border: 2px solid black;
      text-align: center;
      padding: 20px;
      font-family: Arial, Helvetica, sans-serif;
    "
  >
    <h1>My Array: a shopping list</h1>
    <div
      id="array-section"
      style="
        border: 2px solid black;
        display: inline-block;
        padding: 10px;
        margin-bottom: 20px;
        min-width: 200px;
        min-height: 200px;
        text-align: start;
      "
    ></div>
    <br />
    <div id="add-section">
      <input
        type="text"
        id="add-item"
        maxlength="10"
        placeholder="Enter item"
        style="min-width: 200px; height: 20px; margin: 5px"
      /><br />
      <button type="button" id="add-top-button" style="width: 100px">
        Add to top
      </button>
      <button type="button" id="add-bottom-button" style="width: 100px">
        Add to bottom
      </button>
    </div>
    <br />
    <div id="delete-section">
      <button type="button" id="delete-top-button" style="width: 150px">
        Delete from top
      </button>
      <button type="button" id="delete-bottom-button" style="width: 150px">
        Delete from bottom
      </button>
    </div>
    <br /><br /><br /><br /><br /><br />
    <a
      href="./index.html"
      target="_blank"
      rel="noopener"
      style="
        text-decoration: none;
        color: black;
        border: 1px solid black;
        padding: 5px;
      "
      >Other Projects</a
    >
  </body>
</html>

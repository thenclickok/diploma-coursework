<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/bank-app.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Indie+Flower&display=swap"
      rel="stylesheet"
    />
    <script src="projects-logic/bank-app/main.js" type="module" defer></script>
    <title>Bank App</title>
  </head>
  <body>
    <h1>Welcome to the Bank App</h1>
    <h4>Version 1.0</h4>
    <nav id="version-links">
      <h3>Check out Version 2.0</h3>
      <a href="https://portfolio-bank-app.netlify.app/">Live Demo</a>
      <a href="https://github.com/thenclickok/portfolio-bank-app"
        >GitHub Repo</a
      >
      <a href="https://youtu.be/HF2BfXM__Ps">YouTube Walkthrough</a>
      <a href="https://jessica-web-dev.hashnode.dev/bank-app-project"
        >Hashnode Blog Post</a
      >
    </nav>
    <br />
    <div id="wrapper">
      <div id="account-details">
        <h2>Account details</h2>
        <br />
        <p>Account holder:</p>
        <p id="account-holder"></p>
        <br />
        <p>Account number:</p>
        <p id="account-number"></p>
      </div>

      <div id="account-actions">
        <h2>Account Options</h2>
        <br />
        <div id="balance-section">
          <button id="check-balance">CHECK BALANCE</button>
          <p>Account balance:</p>
          <p id="balance"></p>
        </div>
        <br />

        <div id="deposit-section">
          <label for="deposit-input"
            >Enter deposit amount, then click DEPOSIT</label
          ><br />
          <input
            type="number"
            id="deposit-input"
            name="deposit-input"
            min="1"
            max="100"
          />
          <button type="submit" id="deposit-submit">DEPOSIT</button>
        </div>
        <br />

        <div id="withdrawal-section">
          <label for="withdrawal-input"
            >Enter withdrawal amount, then click WITHDRAW</label
          ><br />
          <input
            type="number"
            id="withdrawal-input"
            name="withdrawal-input"
            min="1"
            max="100"
          />
          <button type="submit" id="withdrawal-submit">WITHDRAW</button>
        </div>
        <br />
        <p id="message"></p>
      </div>
    </div>
    <div id="home-link">
      <a href="./index.html">Other Projects</a>
    </div>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/ls-new-entry.css" />
    <script
      src="https://kit.fontawesome.com/ef92c49664.js"
      crossorigin="anonymous"
    ></script>
    <title>Editor</title>
  </head>
  <body>
    <header>
      <h3>The Digital Velium</h3>
      <nav>
        <a href="ls-vault.html" target="_blank" rel="noopener" id="archive-link"
          >Archive</a
        >
        <span id="new-entry-page">New Entry</span>
        <a href="ls-index.html" target="_blank" rel="noopener" id="profile-icon"
          ><i class="fa-solid fa-circle-user"></i
        ></a>
      </nav>
    </header>
    <main>
      <div id="new-entry-title">
        <p id="date-today"></p>
        <h2 id="untitled-reflection">Untitled Reflection</h2>
      </div>
      <div class="tag-div">
        <div class="tag"><i class="fa-solid fa-face-grin"></i>Thoughtful</div>
        <button type="button" id="add-tag">+ Add Tag</button>
      </div>
      <div id="reflection-div">
        <p id="side-note">
          DEPTH INSIGHT <br /><br />
          <i
            >Write without judgment. The velium only remembers what you choose
            to ink.</i
          >
        </p>
        <textarea
          id="reflection"
          rows="10"
          cols="40"
          placeholder="Begin your reflection..."
        ></textarea>
      </div>
      <div id="options">
        <div id="options-left">
          <button type="button" id="memory-button">
            <i class="fa-solid fa-image"></i><span> Insert Memory</span></button
          ><button type="button" id="private-button">
            <i class="fa-solid fa-lock"></i><span> Private</span>
          </button>
        </div>
        <div id="options-right">
          <button type="button" id="discard-button">Discard</button
          ><button type="button" id="save-entry-button">Save Entry</button>
        </div>
      </div>
    </main>
    <footer>
      <div id="copyright">
        <i class="fa-regular fa-copyright"></i
        ><span>2026 My ITOL Vault. Designesd for reflection.</span>
      </div>
      <nav>
        <a href="#">Privacy</a><a href="#">Terms</a><a href="#">Archive</a>
      </nav>
    </footer>
  </body>
</html>

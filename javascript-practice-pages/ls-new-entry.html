<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/ls-new-entry.css" />
    <script
      src="https://kit.fontawesome.com/ef92c49664.js"
      crossorigin="anonymous"
    ></script>
    <script src="projects-logic/local-storage/new-entry.js" defer></script>
    <title>Editor</title>
  </head>
  <body>
    <header>
      <h3>The Digital Velium</h3>
      <nav>
        <a href="ls-vault.html" id="archive-link">Archive</a>
        <span id="new-entry-page">New Entry</span>
        <a href="ls-index.html" id="profile-icon" aria-label="profile"
          ><i class="fa-solid fa-circle-user" aria-hidden="true"></i
        ></a>
      </nav>
    </header>
    <main>
      <form id="entry-form">
        <div id="new-entry-title">
          <p id="date-today"></p>
          <input type="hidden" id="hidden-date-input" name="entryDate" />
          <input
            type="text"
            id="untitled-reflection"
            name="title"
            placeholder="Untitled Reflection"
            minlength="3"
            maxlength="25"
            required
          />
        </div>
        <div class="tag-div">
          <div class="tag">
            <i class="fa-solid fa-face-grin" aria-hidden="true"></i>Thoughtful
          </div>
          <button type="button" id="add-tag">+ Add Tag</button
          ><input
            type="text"
            id="tag-input"
            name="custom-tag"
            maxlength="10"
            placeholder="New tag..."
          />
        </div>
        <div id="reflection-div">
          <p id="side-note">
            DEPTH INSIGHT <br /><br />
            <i
              >Write without judgment. The velium only remembers what you choose
              to ink.</i
            >
          </p>
          <textarea
            id="reflection"
            name="reflection-content"
            rows="10"
            cols="40"
            minlength="5"
            maxlength="75"
            placeholder="Begin your reflection..."
          ></textarea>
        </div>
        <div id="options">
          <div id="options-left">
            <button type="button" id="memory-button">
              <i class="fa-solid fa-image" aria-hidden="true"></i
              ><span> Insert Memory</span></button
            ><button type="button" id="private-button">
              <i class="fa-solid fa-lock" aria-hidden="true"></i
              ><span> Private</span>
            </button>
          </div>
          <div id="options-right">
            <button type="reset" id="discard-button">Discard</button
            ><button type="submit" id="save-entry-button">Save Entry</button>
          </div>
        </div>
      </form>
    </main>
    <footer>
      <div id="copyright">
        <i class="fa-regular fa-copyright" aria-hidden="true"></i
        ><span>2026 My ITOL Vault. Designesd for reflection.</span>
      </div>
      <nav>
        <a href="#">Privacy</a><a href="#">Terms</a><a href="#">Archive</a>
      </nav>
    </footer>
  </body>
</html>

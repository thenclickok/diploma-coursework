<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
    />

    <!--Challenge: Style HTML forms to make them 
visually appealing and user-friendly.
Requirements: Use CSS to customize form elements 
such as input fields, buttons, labels, and validation messages. 
Pay attention to layout, colors, and typography.-->

    <title>Form Styling Challenge</title>
  </head>
  <style>
    /*page layout including Google font*/
    .montserrat-font {
      font-family: "Montserrat", sans-serif;
      font-optical-sizing: auto;
      font-weight: 300;
      font-style: normal;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Montserrat", sans-serif;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      width: 100%;
    }

    .logo {
      grid-column: span 1;
    }

    .navigation {
      grid-column: span 2;
    }

    .search {
      grid-column: span 2;
    }

    .icons {
      grid-column: span 1;
    }

    .products {
      grid-column: span 6;
      min-height: 70vh;
    }

    .overlay {
      grid-column: span 6;
    }

    .success-popup {
      grid-column: span 6;
    }

    /*header padding*/

    .logo,
    .navigation,
    .search,
    .icons {
      margin-top: 20px;
      margin-bottom: 20px;
    }

    /*logo in header*/

    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.7;
    }

    /*navigation bar in header*/

    .navigation {
      display: flex;
      justify-content: center;
      align-items: center;
      ul {
        display: flex;
        flex-direction: row;
        justify-content: center;
        align-items: center;
        list-style-type: none;
        padding: 0;
        margin: 0;
      }
      li {
        margin: 5px;
        text-align: center;
      }
      a {
        text-decoration: none;
        background-color: rgb(247, 219, 166);
        color: black;
        padding: 5px;
        display: inline-block;
      }

      a.active {
        background-color: orange;
        color: black;
      }
      a:hover {
        font-weight: 600;
      }
    }

    /*search bar in header*/

    .search {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-left: 20px;
      button {
        float: right;
        font-size: 20px;
        padding: 5px;
      }
      input {
        font-size: 20px;
        padding: 5px;
      }
    }

    /*icons in header*/

    .icons {
      display: flex;
      flex-direction: row;
      justify-content: center;
      align-items: center;
      button {
        margin: 5px;
      }
    }

    /*products*/

    .products-container {
      display: grid;
      grid-template-columns: auto auto auto;
      place-items: center;
      gap: 20px;
      margin: 20px;
      figcaption {
        font-weight: 600;
      }
    }

    .products h1,
    h2,
    h3,
    p {
      text-align: center;
    }

    .small {
      font-size: 11px;
      font-style: italic;
    }

    /*contact form*/

    .overlay {
      /*Hiding the contact div until user clicks the button in the nav*/
      display: none;
      position: fixed; /*fixed position lets form escape the grid to
          take over the page*/
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      z-index: 1000;
    }

    /*ALTERNATIVE (to make form fade-in): .overlay display:flex(justify-content,align-items)
        and opacity 0, visibility hidden, transition: opacity 0.4s ease, visibility 0.4s ease;
        THEN .overlay:target opacity 1 visibility visible*/

    .overlay:target {
      /* When contact us button is clicked, the URL ends in #contact, 
      which tells browser to display this div */
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .form-container {
      background-color: white;
      padding: 2rem;
      border-radius: 8px;
      position: relative;
      width: 700px;
      height: 500px;
      text-align: center;
      form {
        display: grid;
        place-items: center;
        gap: 10px;
        margin: 40px;
        input {
          width: 300px;
          font-size: 1rem;
        }
        textarea {
          font-size: 1rem;
          width: 300px;
          height: 200px;
        }
        button {
          font-size: 16px;
        }
      }
    }

    .close-button {
      position: absolute;
      top: 10px;
      right: 15px;
      text-decoration: none;
      font-size: 1.5rem;
      color: black;
    }

    /*success message*/

    .success-popup {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: white;
      padding: 20px;
      border: 1px solid black;
      z-index: 1001;
    }

    /*If I use top and left 50%, browswer places
    top left corner of popup in center of screen.
    To center it I need transform: translate(-50%, -50%);
    to move element by half its own width and height*/

    #success-msg {
      width: 300px;
      padding: 40px;
      font-size: large;
      text-align: center;
    }

    #success-msg:target {
      display: block;
    }

    /*media queries*/

    @media only screen and (max-width: 1100px) {
      .navigation ul {
        flex-wrap: wrap; /* Allows items to move to the next line */
      }

      .navigation li {
        flex: 0 0 40%;
        box-sizing: border-box;
      }
    }

    @media only screen and (max-width: 850px) {
      .icons {
        flex-direction: column;
        gap: 10px;
      }
    }

    @media only screen and (max-width: 700px) {
      .container {
        grid-template-columns: repeat(2, 1fr);
      }

      .logo {
        grid-column: span 1;
      }

      .navigation {
        grid-column: span 1;
      }

      .search {
        grid-column: span 1;
      }

      .icons {
        grid-column: span 1;
      }

      .products {
        grid-column: span 2;
        min-height: 70vh;
      }

      .overlay {
        grid-column: span 2;
      }

      .success-popup {
        grid-column: span 2;
      }

      .navigation ul {
        display: flex;
        flex-direction: column;
      }

      .products-container {
        grid-template-columns: auto auto;
      }
    }
  </style>
  <body>
    <div class="container">
      <div class="logo">
        <img
          id="my-logo"
          src="images/my-logo.png"
          alt="my logo"
          width="120"
          height="auto"
        />
      </div>
      <nav class="navigation">
        <ul>
          <li><a href="#" class="button active">Home</a></li>
          <li><a href="#" class="button">About Us</a></li>
          <li><a href="./index.html" class="button">Other Projects</a></li>
          <li><a href="#contact" class="button">Contact Us</a></li>
        </ul>
      </nav>
      <div class="search">
        <input type="search" placeholder="Search this page" />
        <button type="submit"><i class="fa fa-search"></i></button>
      </div>
      <div class="icons">
        <button type="button">
          <img
            src="images/question-mark.png"
            alt="question mark icon"
            width="40"
            height="auto"
          />
        </button>
        <button type="button">
          <img
            src="images/shopping-basket.png"
            alt="shopping basket icon"
            width="40"
            height="auto"
          />
        </button>
      </div>
      <div class="products">
        <h1>Merchandise:</h1>
        <br />
        <h2>All of your Kitchen Essentials</h2>
        <br />
        <h3>Click the <mark>Contact Us</mark> button <br />to Order Now</h3>
        <br />
        <p class="small">Images courtesy of Freepik</p>
        <div class="products-container">
          <figure>
            <img
              src="images/form-styling-products-1.jpg"
              alt="cutlery and plates"
              width="200"
              height="auto"
            />
            <figcaption>Cutlery and plate set</figcaption>
          </figure>
          <figure>
            <img
              src="images/form-styling-products-2.jpg"
              alt="coffee maker"
              width="200"
              height="auto"
            />
            <figcaption>Coffee-maker</figcaption>
          </figure>
          <figure>
            <img
              src="images/form-styling-products-3.jpg"
              alt="potted plants"
              width="200"
              height="auto"
            />
            <figcaption>Potted plants</figcaption>
          </figure>

          <figure>
            <img
              src="images/form-styling-products-4.jpg"
              alt="cooking pot"
              width="200"
              height="auto"
            />
            <figcaption>Cooking pot</figcaption>
          </figure>

          <figure>
            <img
              src="images/form-styling-products-5.jpg"
              alt="glass jars"
              width="200"
              height="auto"
            />
            <figcaption>Glass jars</figcaption>
          </figure>

          <figure>
            <img
              src="images/form-styling-products-6.jpg"
              alt="bowls, assorted sizes"
              width="200"
              height="auto"
            />
            <figcaption>Bowls, assorted sizes</figcaption>
          </figure>

          <figure>
            <img
              src="images/form-styling-products-7.jpg"
              alt="dishwashing liquid"
              width="200"
              height="auto"
            />
            <figcaption>Dishwashing liquid</figcaption>
          </figure>

          <figure>
            <img
              src="images/form-styling-products-8.jpg"
              alt="wooden spoons"
              width="200"
              height="auto"
            />
            <figcaption>Wooden spoons</figcaption>
          </figure>

          <figure>
            <img
              src="images/form-styling-products-9.jpg"
              alt="design consultation"
              width="200"
              height="auto"
            />
            <figcaption>Design consultation</figcaption>
          </figure>
        </div>
      </div>
      <div id="contact" class="overlay">
        <div class="form-container">
          <a href="#" class="close-button">&times;</a>
          <h2>Send Us Your Order Request</h2>
          <form action="#success-msg" method="get">
            <input type="text" placeholder="Name" required />
            <input type="email" placeholder="Email" required />
            <textarea placeholder="Message" required></textarea>
            <button type="submit">Submit</button>
            <!--clickiing this button makes the url end in #success-msg 
            (because of the form action) which activates the css rule 
            #success-msg:target display: block;
          (AND clicking the close button at the top of form will cancel 
          the target rule so it reverts to display:none)-->
          </form>
        </div>
      </div>
      <div id="success-msg" class="success-popup">
        <h3>Form Submitted!</h3>
        <br />
        <p>Thank you <br />for your message.</p>
        <a href="#" class="close-button">&times;</a>
      </div>
    </div>
  </body>
</html>

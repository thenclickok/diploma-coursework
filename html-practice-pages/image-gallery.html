<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
    />
    <title>Image Gallery</title>

    <!--7.Challenge: Build an image gallery webpage using HTML and CSS. 
Requirements: Display multiple images in a grid layout with responsive 
design. Add hover effects or lightbox functionality for an interactive 
experience.-->

    <style>
      /*page layout*/

      * {
        box-sizing: border-box;
        padding: 0;
        margin: 0;
      }

      /*header section*/

      .header {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      width: 100%;
      background-color: rgb(17, 17, 17);
      }

      .logo {
        grid-column: span 1;
      }

      .navigation {
        grid-column: span 2;
      }

      .search {
        grid-column: span 2;
      }

      .icons {
        grid-column: span 1;
      }

      /*header padding*/

      .logo,
      .navigation,
      .search,
      .icons {
        margin-top: 20px;
        margin-bottom: 20px;
      }

      /*header elements to have rounded edges*/

      .header img, 
      .header button, 
      .header input, 
      .header .button {
        border-radius: 5px;
        border: none; /* Optional: cleans up default browser styles */
      }

      .search input {
        margin-right: 5px;
      }

      /*logo in header*/

      .logo {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /*navigation bar in header*/

      .navigation {
        display: flex;
        justify-content: center;
        align-items: center;
        ul {
          display: flex;
          flex-direction: row;
          justify-content: center;
          align-items: center;
          list-style-type: none;
          padding: 0;
          margin: 0;
        }
        li {
          margin: 5px;
          text-align: center;
        }
        a {
          text-decoration: none;
          background-color: white;
          color: black;
          padding: 5px;
          display: inline-block;
        }

        a.active {
          background-color: rgb(105, 13, 233);
          color: white;
        }
        a:hover {
          font-weight: 600;
        }
      }

      /*search bar in header*/

      .search {
        display: flex;
        justify-content: center;
        align-items: center;
        margin-left: 20px;
        button {
          float: right;
          font-size: 20px;
          padding: 5px;
        }
        input {
          font-size: 20px;
          padding: 5px;
        }
      }

      ::placeholder {
        color: black;
      }

      /*icons in header*/

      .icons {
        display: flex;
        flex-direction: row;
        justify-content: center;
        align-items: center;
        button {
          margin: 5px;
        }
      }

      /*gallery section*/

      .gallery {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        grid-auto-rows: 250px;
        grid-auto-flow: dense;
        gap: 10px;
        margin: 10px;
        }


      .item-1 {
        grid-column: 1 / span 1;
      }

      .item-2 {
        grid-column: 2;
        grid-row: span 2;
      }

      .item-3 {
        grid-column: 3 / span 2;
      }

      .item-4 {
        grid-column: 1 / span 1; 
      }

      .item-5 {
        grid-column: 3 / span 1;
      }

      .item-6 {
        grid-column: 4 / span 1;
      }

      .item-7 {
        grid-column: 1 / span 1;
      }

      .item-8 {
        grid-column: 2 / span 1;
      }

      .item-9 {
        grid-column: 3 / span 2; 
      }

      .gallery img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        border: 3px solid rgb(105, 13, 233);
        border-radius: 5px;
      }

      /*lightbox*/

      .lightbox {
        display: none; 
        position: fixed;
        z-index: 999;
        top: 0; left: 0;
        width: 100%; 
        height: 100%;
        background: rgba(0, 0, 0, 0.8);
      }

      .lightbox:target {
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .lightbox-content {
        position: relative;
        max-width: 90%;
        max-height: 80%;
      }

      .lightbox-content img {
        width: 100%;
        max-height: 80vh;
        border: 5px solid white;
      }

      .close-button {
        position: absolute;
        top: -40px; right: 0;
        color: white;
        font-size: 30px;
        text-decoration: none;
      }

      .close-overlay {
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        cursor: default;
      } 

      /*lightbox caption positioned on cake for name and price*/

      figcaption {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        font-size: 25px;
        padding: 10px 0;
        text-align: center;
        color: white;
        background-color: rgb(105, 13, 233);
        border-bottom: 4px solid white;
        border-right: 4px solid white;
        border-left: 4px solid white;
      }

      /*footer section*/



      .footer {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        }

      /*order form*/

      .form-container {
        background-color: white;
        padding: 2rem;
        border-radius: 8px;
        position: relative;
        width: 700px;
        height: 500px;
        text-align: center;
        form {
          display: grid;
          place-items: center;
          gap: 10px;
          margin: 40px;
          input {
            width: 300px;
            font-size: 1rem;
          }
        textarea {
          font-size: 1rem;
          width: 300px;
          height: 200px;
        }
        button {
          font-size: 16px;
        }
      }
    }

      .close-button {
        position: absolute;
        top: 10px;
        right: 15px;
        text-decoration: none;
        font-size: 1.5rem;
        color: black;
      }

      /*success message*/

      .success-popup {
        display: none;
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: white;
        padding: 20px;
        border: 1px solid black;
        z-index: 1001;
      }

      /*If I use top and left 50%, browswer places
      top left corner of popup in center of screen.
      To center it I need transform: translate(-50%, -50%);
      to move element by half its own width and height*/

      #success-msg {
        width: 300px;
        padding: 40px;
        font-size: large;
        text-align: center;
      }

      #success-msg:target {
        display: block;
      }

    /*footer bottom*/

      .footer-bottom {
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: black;
        p {
          text-align: center;
          font-size: 16px;
          color: white;
          margin: 20px;
          padding: 20px;
        }
      }

      /*media queries*/

      @media only screen and (max-width: 1100px) {
        .navigation ul {
          flex-wrap: wrap; /* Allows items to move to the next line */
        }

        .navigation li {
          flex: 0 0 50%;
          box-sizing: border-box;
        }
      }

      @media only screen and (max-width: 850px) {
        .icons {
          flex-direction: column;
          gap: 10px;
        }
      }

      @media only screen and (max-width: 700px) {
        .header {
          grid-template-columns: repeat(2, 1fr);
        }

        .logo {
          grid-column: span 1;
        }

        .navigation {
          grid-column: span 1;
        }

        .search {
          grid-column: span 1;
        }

        .icons {
          grid-column: span 1;
        }

        .navigation ul {
          display: flex;
          flex-direction: column;
        }
      }

    </style>
  </head>
  <body>
    <!--IDEA: inspirational website with quotes and positivity
    
    reuse header from form styling 
but include gallery in middle of nav and make it active 
(the drawing shows logo, nav with gallery, search bar, question mark and shopping basket)
-->

    <header class="header">
      <div class="logo">
        <img
          id="my-logo"
          src="images/my-logo.png"
          alt="my logo"
          width="120"
          height="auto"
        />
      </div>
      <nav class="navigation">
        <ul>
          <li><a href="#" class="button">Home</a></li>
          <li><a href="#" class="button">About Us</a></li>
          <li><a href="#" class="button active">Gallery</a></li>
          <li><a href="./index.html" class="button">Other Projects</a></li>
          <li><a href="#" class="button">Contact Us</a></li>
        </ul>
      </nav>
      <div class="search">
        <input type="search" placeholder="Search this page" />
        <button type="submit"><i class="fa fa-search"></i></button>
      </div>
      <div class="icons">
        <button type="button">
          <img
            src="images/question-mark.png"
            alt="question mark icon"
            width="40"
            height="auto"
          />
        </button>
        <button type="button">
          <img
            src="images/shopping-basket.png"
            alt="shopping basket icon"
            width="40"
            height="auto"
          />
        </button>
    </header>

    <div class="gallery">
      <a href="#img1" class="item-1">
        <img src="images/gallery-cherry.jpg" alt="cherry cake" width="200" height="250"/>
      </a>
      <div id="img1" class="lightbox">
        <!-- Clicking the background resets the target to close the lightbox -->
        <a href="#" class="close-overlay"></a>
  
        <figure class="lightbox-content">
          <img src="images/gallery-cherry.jpg" alt="Full Image"/>
          <figcaption>Cherry Cake £25</figcaption>
          <a href="#" class="close-button">&times;</a>
        </figure>
      </div>

      <a href="#img2" class="item-2">
        <img src="images/gallery-wedding.jpg" alt="wedding cake" width="200" height="500"/>
      </a>
      <div id="img2" class="lightbox">
        <a href="#" class="close-overlay"></a>
  
        <figure class="lightbox-content">
          <img src="images/gallery-wedding.jpg" alt="Full Image"/>
          <figcaption>Wedding Cake £120</figcaption>
          <a href="#" class="close-button">&times;</a>
        </figure>
      </div>

      <a href="#img3" class="item-3">
        <img src="images/gallery-selection.jpg" alt="selection of cakes" width="400" height="250"/>
      </a>

      <div id="img3" class="lightbox">
        <a href="#" class="close-overlay"></a>
  
        <figure class="lightbox-content">
          <img src="images/gallery-selection.jpg" alt="Full Image"/>
          <figcaption>Selection Box £50</figcaption>
          <a href="#" class="close-button">&times;</a>
        </figure>
      </div>

      <a href="#img4" class="item-4">
        <img src="images/gallery-carrot.jpg" alt="carrot cake" width="200" height="250"/>
      </a>

      <div id="img4" class="lightbox">
        <a href="#" class="close-overlay"></a>

       <figure class="lightbox-content">
          <img src="images/gallery-carrot.jpg" alt="Full Image"/>
          <figcaption>Carrot Cake £25</figcaption>
          <a href="#" class="close-button">&times;</a>
        </figure>
      </div> 

      <a href="#img5" class="item-5">
        <img src="images/gallery-christmas.jpg" alt="Christmas cake" width="200" height="250"/>
      </a>

      <div id="img5" class="lightbox">
        <a href="#" class="close-overlay"></a>

       <figure class="lightbox-content">
          <img src="images/gallery-christmas.jpg" alt="Full Image"/>
          <figcaption>Christmas Cake £35</figcaption>
          <a href="#" class="close-button">&times;</a>
        </figure>
      </div> 


      <a href="#img6" class="item-6">
        <img src="images/gallery-chocolate.jpg" alt="chocolate cake" width="200" height="250"/>
      </a>

      <div id="img6" class="lightbox">
        <a href="#" class="close-overlay"></a>

        <figure class="lightbox-content">
          <img src="images/gallery-chocolate.jpg" alt="Full Image"/>
          <figcaption>Chocolate Cake £25</figcaption>
          <a href="#" class="close-button">&times;</a>
        </figure>
      </div> 


      <a href="#img7" class="item-7">
        <img src="images/gallery-cupcakes.jpg" alt="cupcakes" width="200" height="250"/>
      </a>

      <div id="img7" class="lightbox">
        <a href="#" class="close-overlay"></a>

        <figure class="lightbox-content">
          <img src="images/gallery-cupcakes.jpg" alt="Full Image"/>
          <figcaption>Cupcakes (x6) £20</figcaption>
          <a href="#" class="close-button">&times;</a>
        </figure>
      </div> 

      <a href="#img8" class="item-8">
        <img src="images/gallery-kids.jpg" alt="kids party cake" width="200" height="250"/>
      </a>

      <div id="img8" class="lightbox">
        <a href="#" class="close-overlay"></a>

        <figure class="lightbox-content">
          <img src="images/gallery-kids.jpg" alt="Full Image"/>
          <figcaption>Kids Party Cake £35</figcaption>
          <a href="#" class="close-button">&times;</a>
        </figure>
      </div> 


      <a href="#img9" class="item-9">
        <img src="images/gallery-valentines.jpg" alt="Valentine's Day cake" width="400" height="250"/>
      </a>

      <div id="img9" class="lightbox">
        <a href="#" class="close-overlay"></a>

        <figure class="lightbox-content">
          <img src="images/gallery-valentines.jpg" alt="Full Image"/>
          <figcaption>Valentine's Day Cake £25</figcaption>
          <a href="#" class="close-button">&times;</a>
        </figure>
      </div>
    </div>

    <footer class="footer">
      <div class="footer-top">

        <div class="form-container">
          <h2>Send Us Your Order Request</h2>
          <form action="#success-msg" method="get">
            <input type="text" placeholder="Name" required />
            <input type="email" placeholder="Email" required />
            <textarea placeholder="Message" required></textarea>
            <button type="submit">Submit</button>
            <!--clickiing this button makes the url end in #success-msg 
            (because of the form action) which activates the css rule 
            #success-msg:target display: block;
          (AND clicking the close button at the top of form will cancel 
          the target rule so it reverts to display:none)-->
          </form>
        </div>

        <div id="success-msg" class="success-popup">
          <h3>Form Submitted!</h3>
          <br />
          <p>Thank you <br />for your message.</p>
          <a href="#" class="close-button">&times;</a>
        </div>



        <!--TO DO: sitemap and logo-icons divs plus media queries.

        -->

      </div>
      <div class="footer-bottom">
        <p>Copyright 2026. All rights reserved. SCRUMPTIOUS CAKES</p>
      </div>
    </footer>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML Essentials course challenges</title>

    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: Cambria, Cochin, Georgia, Times, "Times New Roman", serif;
        color: black;
        background-image: url("images/index-background-image.jpg");
        background-size: cover;
      }

      .container {
        display: grid;
        grid-template-areas: "header header header" "button-group";
        place-items: center;
        align-content: center;
        text-align: center;
        height: 100vh;
        width: 100vw;
      }

      .header {
        grid-area: "header";
        margin-bottom: 30px;
      }

      .button-group {
        grid-area: "button-group";
      }

      .container p {
        font-style: italic;
        font-size: large;
      }

      .button-group {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
      }

      .button-group button {
        border-radius: 8px;
        margin: 10px;
      }

      .button-group a {
        text-decoration: none;
        font-size: large;
        color: black;
        padding: 10px;
      }

      .button-group button:hover {
        background-color: rgb(223, 202, 244);
      }

      footer a {
        text-decoration: none;
        float: left;
        color: black;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">

        <br />
        <h3><i>Click a button to view a project</i></h3>
      </div>
      <br />
      <br|>

        </button>

        <button>
          <a href="./flex-and-grid-layout.html">5. Flex and Grid Layout</a>
        </button>

        <button>
          <a href="./typography-challenge.html">6. Typography Challenge</a>
        </button>

        <button>
          <a href="./image-gallery.html">7. Image Gallery</a>
        </button>

        <button>

            >8. CSS Framework Challenge</a
          >
        </button>

        <button>

        <button>

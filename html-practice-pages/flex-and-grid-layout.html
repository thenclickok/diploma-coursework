<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flex and Grid Layout Challenge</title>
    <!--Challenge: Create a webpage layout using Flexbox or CSS Grid. 
    Requirements: Use Flexbox or CSS Grid to create a multi-column layout 
    with responsive design. Experiment with different alignment, spacing, 
    and distribution options.-->

    <!--Note to self: for laptop screen I specified both columns and rows 
    for my grid, using span for both (on each image item) and specified the 
    width of each img in the html. Media query for 1250px screen then gets the 
    browser to fit images together responsively. I had to add to regular CSS for 
    images: max-width: 100%/height: auto/display: block; AND I used auto-fit and 
    minmax in media query. Long photos aspect ratio got wonky on smaller
    screen but will avoid mixed methods next time -->

    <style>
      /*page layout*/

      * {
        box-sizing: border-box;
        padding: 0;
        margin: 0;
      }

      body {
        background-color: rgb(233, 249, 233);
      }

      /*top half of page - gallery*/

      .container {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        grid-template-rows: repeat(6, 1fr);
        place-items: center;
        max-width: 100vw;
        height: 100vh;
        gap: 15px;
      }

      #item-1 {
        grid-column: 1 / span 1;
        grid-row: 1 / span 3;
        height: 95%;
      }

      #item-2 {
        grid-column: 2 / span 1;
        grid-row: 1 / span 3;
        height: 95%;
      }

      #item-3 {
        grid-column: 3 / span 1;
        grid-row: 1 / span 5;
        height: 95%;
      }

      #item-4 {
        grid-column: 4 / span 2;
        grid-row: 1 / span 2;
        height: 95%;
      }

      #item-5 {
        grid-column: 1 / span 1;
        grid-row: 4 / span 3;
        height: 95%;
      }

      #item-6 {
        grid-column: 2 / span 1;
        grid-row: 4 / span 2;
        height: 95%;
      }

      #item-7 {
        grid-column: 2 / span 1;
        grid-row: 6 / span 1;
        height: 95%;
      }

      #item-8 {
        grid-column: 4 / span 1;
        grid-row: 3 / span 3;
        height: 95%;
      }

      #item-9 {
        grid-column: 3 / span 2;
        grid-row: 6 / span 1;
        height: 95%;
      }

      #item-10 {
        grid-column: 5 / span 1;
        grid-row: 3 / span 4;
        height: 95%;
      }

      .container img {
        border: 2px solid green;
        border-radius: 5px;
        max-width: 100%;
        height: auto;
        display: block;
      }

      /*bottom half of page - inviting volunteers*/

      .invite {
        display: block;
        max-width: 100vw;
        border-top: 1px solid black;
      }

      .invite-top {
        display: flex;
        align-items: left;
        background-color: rgb(139, 255, 139);
      }

      /*top part of invite section*/

      #logo {
        margin: 5px;
      }

      /*navigation menu*/

      .navigation {
        margin: 40px;
        ul {
          display: flex;
          flex-direction: row;
          justify-content: center;
          align-items: center;
          list-style-type: none;
          padding: 0;
          margin: 0;
        }
        li {
          margin: 5px;
          text-align: center;
          font-size: large;
        }
        a {
          text-decoration: none;
          background-color: white;
          border: 1px solid black;
          color: black;
          padding: 5px;
          display: inline-block;
          border-radius: 8px;
        }

        a.active {
          color: black;
          font-weight: bold;
        }
        a:hover {
          font-weight: 600;
          background-color: rgb(90, 169, 90);
        }
      }

      /*hidden message*/

      .hidden {
        display: none;
        border: 1px solid black;
        width: 400px;
        height: 100px;
        background-color: white;
        text-align: center;
        padding: 30px;
        margin-left: calc(50% - 200px);
        font-size: x-large;
      }

      #thanks:target {
       display: block;
      }

      .close-button {
        position:absolute;  
        top: 0px;
        right: calc(50% - 200px);
        text-decoration: none;
        border: 1px solid black;
        padding: 2px 4px 2px 4px;
        margin: 5px;
        background-color: rgb(157, 218, 157);
        font-weight: bold;
      }

      /*bottom part of invite section*/
  
      .invite-bottom {
        display: flex;        
        justify-content: center;
        align-items: center;
        text-align: center;
        margin: 20px;
        padding: 20px;
          .box {
            background-color: white;
            border: 1px solid black;
            border-radius: 8px;
            margin: 20px;
            padding: 20px;
            font-size: large;
            min-width: 400px;
        }
      }

    .form input {
      font-size: 1rem;     
      padding: 10px; 
      margin-top: 10px;   
      margin-bottom: 10px;
      width: 100%;           
    }

    .form button {
      font-size: 20px;
      background-color: rgb(122, 212, 122);
      border-radius: 8px;
      padding: 5px;
    }
    
    /*media queries*/

    @media only screen and (max-width: 1250px) {
    .container {
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); /*browser decides column number, min 200px each pic*/
      grid-template-rows: auto; /*reset rows to auto*/
      height: auto; 
    }

    .container > img { /*all items must stop following the span rules*/
      grid-column: auto !important;
      grid-row: auto !important;
      width: 100%;
      height: 300px; /* Or whatever height looks best on mobile */
    }
    }

    @media only screen and (max-width: 600px) {
      .navigation ul {
        display: block;
        justify-items: left;
      }
    }
    </style>
  </head>
  <body>

  </body>
</html>

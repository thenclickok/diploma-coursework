<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flex and Grid Layout Challenge</title>
    <!--Challenge: Create a webpage layout using Flexbox or CSS Grid. 
    Requirements: Use Flexbox or CSS Grid to create a multi-column layout 
    with responsive design. Experiment with different alignment, spacing, 
    and distribution options.-->

    <style>
      /*page layout*/

      * {
        box-sizing: border-box;
        padding: 0;
        margin: 0;
      }

      body {
        background-color: rgb(233, 249, 233);
      }

      /*top half of page - gallery*/

      .container {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        grid-template-rows: repeat(6, 1fr);
        place-items: center;
        max-width: 100vw;
        height: 100vh;
        gap: 15px;
      }

      #item-1 {
        grid-column: 1 / span 1;
        grid-row: 1 / span 3;
        height: 95%;
      }

      #item-2 {
        grid-column: 2 / span 1;
        grid-row: 1 / span 3;
        height: 95%;
      }

      #item-3 {
        grid-column: 3 / span 1;
        grid-row: 1 / span 5;
        height: 95%;
      }

      #item-4 {
        grid-column: 4 / span 2;
        grid-row: 1 / span 2;
        height: 95%;
      }

      #item-5 {
        grid-column: 1 / span 1;
        grid-row: 4 / span 3;
        height: 95%;
      }

      #item-6 {
        grid-column: 2 / span 1;
        grid-row: 4 / span 2;
        height: 95%;
      }

      #item-7 {
        grid-column: 2 / span 1;
        grid-row: 6 / span 1;
        height: 95%;
      }

      #item-8 {
        grid-column: 4 / span 1;
        grid-row: 3 / span 3;
        height: 95%;
      }

      #item-9 {
        grid-column: 3 / span 2;
        grid-row: 6 / span 1;
        height: 95%;
      }

      #item-10 {
        grid-column: 5 / span 1;
        grid-row: 3 / span 4;
        height: 95%;
      }

      .container img {
        border: 2px solid green;
        border-radius: 5px;
      }

      /*bottom half of page - inviting volunteers*/

      .invite {
        display: flex;
        align-items: center;
        justify-content: center;
        max-width: 100vw;
        border-top: 1px solid black;
      }

      /*top part of invite section*/

      #logo {
        float: left;
        margin: 5px;
      }
    </style>
  </head>
  <body>
    <!--IDEA: SAVE THE EARTH, recruiting cleanup volunteers-->

    <div class="container">
      <img
        id="item-1"
        src="images/earth-child-portrait.jpg"
        alt="A little boy watering a baby tree"
        width="250"
        height="auto"
      />
      <img
        id="item-2"
        src="images/earth-save-planet-portrait.jpg"
        alt="Save the Planet picture"
        width="250"
        height="auto"
      />
      <img
        id="item-3"
        src="images/earth-recycling-portrait.jpg"
        alt="Woman holding recycling containers"
        width="250"
        height="auto"
      />
      <img
        id="item-4"
        src="images/earth-volunteer-rectangle.jpg"
        alt="Three people wearing green volunteering t-shirts"
        width="550"
        height="auto"
      />
      <img
        id="item-5"
        src="images/earth-sapling-portrait.jpg"
        alt="Hands holding a baby tree ready for planting"
        width="250"
        height="auto"
      />
      <img
        id="item-6"
        src="images/earth-volunteer-square.jpg"
        alt="Woman cleaning up the environment"
        width="250"
        height="auto"
      />
      <img
        id="item-7"
        src="images/earth-heart-little-rectangle.jpg"
        alt="Child holding hands in a heart shape in front of a tree trunk"
        width="250"
        height="auto"
      />
      <img
        id="item-8"
        src="images/earth-squirrel-portrait.jpg"
        alt="A brown squirrel"
        width="250"
        height="auto"
      />

      <img
        id="item-9"
        src="images/earth-enviro-little-rectangle.jpg"
        alt="People holding letters to make the word Environment"
        width="550"
        height="auto"
      />
      <img
        id="item-10"
        src="images/earth-coloured-hands-portrait.jpg"
        alt="Several coloured hands"
        width="250"
        height="auto"
      />
    </div>
    <footer class="invite">
      <div>
        <img
          id="logo"
          src="images/my-logo.png"
          alt="My Logo"
          width="100"
          height="100"
        />
      </div>
      <div></div>
    </footer>
  </body>
</html>
